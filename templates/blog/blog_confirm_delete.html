{% extends 'base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center px-4">

  <div class="max-w-md w-full bg-slate-50 rounded-2xl shadow-2xl p-8 text-center">

    <!-- Icon -->
    <div class="mx-auto mb-4 w-16 h-16 rounded-full bg-red-100 flex items-center justify-center">
      <span class="text-3xl text-red-600">⚠️</span>
    </div>

    <!-- Heading -->
    <h2 class="text-2xl font-bold text-slate-900 mb-2">
      Confirm Delete
    </h2>

    <!-- Message -->
    <p class="text-slate-600 mb-6">
      Are you sure you want to delete
      <span class="font-semibold text-slate-900">
        “{{ object.title }}”
      </span>?
      <br>
      This action <span class="text-red-600 font-semibold">cannot be undone</span>.
    </p>

    <!-- Actions -->
    <form method="post" class="flex gap-4 justify-center">
      {% csrf_token %}

      <a
        href="{% url 'blog_detail' object.slug %}"
        class="px-6 py-2 rounded-xl bg-slate-200 text-slate-700 font-semibold hover:bg-slate-300">
        Cancel
      </a>

      <button
        type="submit"
        class="px-6 py-2 rounded-xl bg-red-600 text-white font-semibold hover:bg-red-700">
        Yes, Delete
      </button>
    </form>

  </div>

</div>

{% endblock %}
