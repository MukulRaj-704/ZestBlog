{% extends 'base.html' %}

{% block title %}Password Updated{% endblock %}

{% block content %}

<div class="max-w-lg mx-auto px-4 py-16">

  <div class="bg-white dark:bg-[#1a1a2e] rounded-xl shadow-lg border border-gray-200 dark:border-gray-800 p-8 text-center">

    <!-- ✅ Success SVG Icon -->
    <div class="mx-auto mb-6 w-20 h-20 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg"
           viewBox="0 0 24 24"
           fill="none"
           stroke="currentColor"
           stroke-width="2"
           stroke-linecap="round"
           stroke-linejoin="round"
           class="w-10 h-10 text-green-600 dark:text-green-400">
        <path d="M9 12l2 2 4-4"></path>
        <circle cx="12" cy="12" r="10"></circle>
      </svg>
    </div>

    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">
      Password Changed Successfully
    </h2>

    <p class="text-gray-500 dark:text-gray-400 mb-8">
      Your password has been updated. Your account is now more secure.
    </p>

    <a href="{% url 'user_profile' user.username %}"
       class="inline-flex items-center justify-center gap-2 px-6 py-3 rounded-lg
              bg-primary text-white font-semibold hover:bg-blue-700 transition shadow-md">
      Back to Profile

      <!-- ➜ Arrow SVG -->
      <svg xmlns="http://www.w3.org/2000/svg"
           viewBox="0 0 24 24"
           fill="none"
           stroke="currentColor"
           stroke-width="2"
           stroke-linecap="round"
           stroke-linejoin="round"
           class="w-4 h-4">
        <path d="M5 12h14"></path>
        <path d="M13 5l7 7-7 7"></path>
      </svg>
    </a>

  </div>

</div>

{% endblock %}
