<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#1313ec",
            backgroundLight: "#f6f6f8",
            backgroundDark: "#101022",
          },
          fontFamily: {
            display: ["Inter", "sans-serif"],
          },
        },
      },
    }
  </script>
</head>

<body class="font-display bg-backgroundLight min-h-screen flex items-center justify-center p-4">

  <!-- Card -->
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">

    <!-- Header -->
    <div class="p-4 text-center border-b">
      <h2 class="text-xl font-bold">Login</h2>
    </div>

    <!-- Content -->
    <div class="px-6 py-8">

      <!-- Icon -->
      <div class="flex justify-center mb-6">
        <div class="w-20 h-20 rounded-full bg-primary/10 flex items-center justify-center text-primary">
          <span class="material-symbols-outlined text-4xl">auto_stories</span>
        </div>
      </div>

      <!-- Title -->
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold mb-1">Welcome Back</h1>
        <p class="text-gray-500 text-sm">Sign in to continue</p>
      </div>

      <!-- Error -->
      {% if error %}
        <p class="text-red-600 text-sm text-center mb-4">{{ error }}</p>
      {% endif %}

      <!-- Form -->
      <form method="post" class="space-y-5">
        {% csrf_token %}

        <!-- Username -->
        <div>
          <label class="block text-sm font-medium mb-2">Username</label>
          <input
            type="text"
            name="username"
            required
            placeholder="Enter your username"
            class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200
                   focus:ring-2 focus:ring-primary focus:outline-none"
          />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium mb-2">Password</label>
          <input
            type="password"
            name="password"
            required
            placeholder="Enter your password"
            class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200
                   focus:ring-2 focus:ring-primary focus:outline-none"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-primary hover:bg-blue-700 text-white font-semibold
                 py-3 rounded-lg shadow-md transition flex items-center justify-center gap-2"
        >
          Login
          <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </button>
      </form>

      <!-- Register -->
      <div class="mt-6 text-center">
        <p class="text-sm text-gray-500">
          Don’t have an account?
          <a href="{% url 'register' %}" class="text-primary font-semibold hover:underline">
            Register
          </a>
        </p>
      </div>

    </div>
  </div>

</body>
</html>
